<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- Ye hai CSS aur font links -->
  <link rel="stylesheet" href="Style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
  <!-- Main container shuru -->
  <div class="main">
    <!-- Main image -->
    <img class="Main-image" src="pngwing.com.png" alt="">
    <!-- Left side container -->
    <div id="left-side-container">
      <!-- Pokemon logo -->
      <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="pokemon">
      <!-- Heading for Gen I -->
      <h3>POKEMON GEN I</h3>
      <!-- Main heading Pikachu -->
      <div id="main-heading">Pikachu</div>
      <!-- Pokemon description -->
      <p id="pokemon-description">
        Pikachu is an Electric-type Pokémon introduced in Generation I. Pikachu are small, chubby, and incredibly cute mouse-like Pokémon. They are almost completely covered by yellow fur people.
      </p>
      <!-- Pagination -->
      <div class="pagination">-- 01 / 08</div>
      <!-- Pokemon ball image -->
      <img id="Pokemon-ball" src="pngwing.com (1).png" alt="">
    </div>
    <!-- Right side container -->
    <div id="right-side-container">
      <!-- Menu icon -->
      <div id="menu-icon">
        <i class="ri-menu-line"></i>
      </div>
      <!-- Boxes -->
      <div id="boxes">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
      </div>
    </div>
  </div>
</body>
</html>
